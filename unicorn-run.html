<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title> ELLE'S Unicorn Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    min-height: 100%;
    background: #0d1b12;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #fff;
    overflow: hidden;
    /* mobile: stop rubber-band scroll, tap flashes & accidental text selection */
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    padding: calc(18px + env(safe-area-inset-top)) 0 18px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(4px);
    z-index: 10;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    font-size: 1.4rem;
    transition: color 0.2s, text-shadow 0.2s;
  }

  nav a:hover {
    color: #ff66cc;
    text-shadow: 0 0 12px #ff66cc;
  }

  .game-wrap {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: manipulation;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(13, 27, 18, 0.55);
    backdrop-filter: blur(2px);
    cursor: pointer;
  }

  .overlay.hidden { display: none; }

  .overlay h1 {
    font-family: "Pacifico", cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    margin: 0 0 10px;
    color: #ff9ae0;
    text-shadow: 0 0 20px #c44dad;
  }

  .overlay p {
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    margin: 6px 0;
  }

  .play-btn {
    margin-top: 22px;
    padding: 14px 38px;
    font-size: 1.5rem;
    font-family: "Pacifico", cursive;
    color: #fff;
    background: linear-gradient(90deg, #ff66cc, #b06bff);
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 0 22px rgba(255, 102, 204, 0.7);
    transition: transform 0.15s;
  }

  .play-btn:hover { transform: scale(1.06); }

  .mute-btn {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    right: 18px;
    z-index: 20;
    width: 46px;
    height: 46px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }

  .mute-btn:hover { background: rgba(255, 255, 255, 0.28); }

  @media (max-width: 600px) {
    nav { gap: 12px 16px; padding: calc(10px + env(safe-area-inset-top)) 8px 10px; }
    nav a { font-size: 1.05rem; }
    .mute-btn { top: calc(8px + env(safe-area-inset-top)); right: 10px; width: 40px; height: 40px; font-size: 1.2rem; }
  }
</style>
</head>
<body>
  <nav>
    <a href="i-love-you-elle.html">Home</a>
    <a href="corgi-facts.html">Corgi Facts</a>
    <a href="nutella-facts.html">Nutella Facts</a>
    <a href="kwame-facts.html">Kwami Facts</a>
    <a href="unicorn-run.html">Unicorn Run</a>
    <a href="solar-system.html">Solar System</a>
  </nav>

  <button class="mute-btn" id="muteBtn" title="Music on / off">&#128266;</button>

  <div class="game-wrap">
    <canvas id="game"></canvas>

    <div class="overlay" id="overlay">
      <h1>&#129412; Elle'S Unicorn Run</h1>
      <p>Help the unicorn dash through the magic forest!</p>
      <p>Tap, click, or press <b>Space</b> / <b>&uarr;</b> to jump.</p>
      <p>Grab the &#11088; rainbow star to <b>fly</b> &mdash; tap to flap!</p>
      <p>Grab the &#128150; rainbow heart to <b>smash</b> through anything!</p>
      <button class="play-btn" id="startBtn">Play &#9733;</button>
    </div>
  </div>

<script>
(function () {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const startBtn = document.getElementById("startBtn");

  let W = 0, H = 0, ground = 0;

  // Render at the device's pixel density so sprites & text stay crisp on phones
  // (capped at 2.5x so very high-DPI screens don't tank performance). All game
  // logic stays in CSS pixels — the context transform handles the scaling.
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ground = H * 0.82;
    unicorn.x = W * 0.18;
    if (state !== "play") unicorn.y = ground;
  }

  // ---- Game state ----
  let state = "start";            // start | play | over
  let score = 0;
  let best = +(localStorage.getItem("unicornBest") || 0);
  let speed = 6;
  let spawnTimer = 0;
  let obstacles = [];
  let stars = [];                 // rainbow power-up stars (flight)
  let hearts = [];                // rainbow power-up hearts (smash)
  let sparkles = [];              // burst particles (collect / smash effects)
  let starTimer = 0;
  let heartTimer = 0;
  let trail = [];
  let bgTrees = [];
  let frame = 0;

  // flight power-up state
  let flying = false;
  let flyTimer = 0;
  const FLY_DURATION = 60 * 9;    // ~9 seconds of flight
  const FLY_GRAV = 0.4;           // gentle gravity while flying
  const FLY_FLAP = 9;             // upward push per flap

  // smash power-up state (run through obstacles to destroy them)
  let smashing = false;
  let smashTimer = 0;
  const SMASH_DURATION = 60 * 9;  // ~9 seconds of smashing

  const GRAV = 0.8;
  const JUMP = 17;

  const unicorn = { x: 0, y: 0, vy: 0, size: 60, onGround: true };

  // Unicorn gallop sprite sheet: 8 frames side by side (faces left; flipped when drawn)
  const unicornImg = new Image();
  let unicornReady = false;
  unicornImg.onload = function () { unicornReady = true; };
  unicornImg.src = "unicorn-gallop.png";

  // Unicorn flying sprite sheet: 12 frames (wings flapping), centred on the body
  const flyImg = new Image();
  let flyReady = false;
  flyImg.onload = function () { flyReady = true; };
  flyImg.src = "unicorn-fly.png";

  function reset() {
    score = 0;
    speed = 6;
    spawnTimer = 40;
    obstacles = [];
    stars = [];
    hearts = [];
    sparkles = [];
    starTimer = 60 * 6;           // first star after ~6s
    heartTimer = 60 * 9;          // first heart after ~9s
    flying = false;
    flyTimer = 0;
    smashing = false;
    smashTimer = 0;
    trail = [];
    unicorn.y = ground;
    unicorn.vy = 0;
    unicorn.onGround = true;
  }

  function seedTrees() {
    bgTrees = [];
    for (let i = 0; i < 14; i++) {
      bgTrees.push({
        x: Math.random() * W,
        depth: 0.3 + Math.random() * 0.5,   // parallax factor
        size: 40 + Math.random() * 70
      });
    }
  }

  function jump() {
    if (state !== "play") return;
    if (flying) {                 // while flying, the same input flaps the wings
      unicorn.vy = -FLY_FLAP;
    } else if (unicorn.onGround) {
      unicorn.vy = -JUMP;
      unicorn.onGround = false;
    }
  }

  function startFlight() {
    flying = true;
    flyTimer = FLY_DURATION;      // collecting again refreshes the timer
    unicorn.onGround = false;
    if (unicorn.vy > -4) unicorn.vy = -8;  // a little lift-off
  }

  function startSmash() {
    smashing = true;
    smashTimer = SMASH_DURATION;  // collecting again refreshes the timer
  }

  function burst(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
      sparkles.push({
        x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
        life: 1, hue: Math.floor(Math.random() * 360)
      });
    }
  }

  function startGame() {
    reset();
    state = "play";
    overlay.classList.add("hidden");
    Music.start();
  }

  function gameOver() {
    state = "over";
    best = Math.max(best, Math.floor(score));
    localStorage.setItem("unicornBest", best);
    overlay.innerHTML =
      '<h1>Game Over</h1>' +
      '<p>You ran <b>' + Math.floor(score) + 'm</b> &#127807;</p>' +
      '<p>Best: <b>' + best + 'm</b></p>' +
      '<button class="play-btn" id="againBtn">Run Again &#9733;</button>';
    overlay.classList.remove("hidden");
    document.getElementById("againBtn").addEventListener("click", function (e) {
      e.stopPropagation();
      startGame();
    });
  }

  // ---- Input ----
  function handlePress(e) {
    if (state === "play") { jump(); }
  }
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      if (state === "start" || state === "over") startGame();
      else jump();
    }
  });
  canvas.addEventListener("pointerdown", handlePress);
  startBtn.addEventListener("click", function (e) { e.stopPropagation(); startGame(); });

  // ---- Background music (Web Audio, no files needed) ----
  const Music = (function () {
    const NOTE = {
      0: 0, C3: 130.81, E3: 164.81, F3: 174.61, G3: 196.00, A3: 220.00,
      G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25, D5: 587.33, E5: 659.25, G5: 783.99
    };
    // bouncy 4-bar loop in C (I - vi - IV - V), eighth notes
    const MELODY = [
      "C5","E5","G5","E5", "A4","C5","E5","C5",
      "A4","C5","A4","G4", "B4","D5","B4","G4",
      "C5","E5","G5","E5", "A4","C5","E5","C5",
      "G4","B4","D5","G4", "C5",0,0,0
    ].map(n => NOTE[n] || 0);
    const BASS = [
      "C3","C3","A3","A3", "F3","F3","G3","G3",
      "C3","C3","A3","A3", "G3","G3","C3","C3"
    ].map(n => NOTE[n] || 0);

    const tempo = 138, eighth = 60 / tempo / 2;
    let ctx, master, timer = null, nextTime = 0, step = 0, muted = false;

    function tone(freq, t, dur, type, vol) {
      if (!freq) return;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      o.connect(g); g.connect(master);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t);
      o.stop(t + dur + 0.02);
    }

    function scheduler() {
      while (nextTime < ctx.currentTime + 0.15) {
        const m = MELODY[step % MELODY.length];
        tone(m, nextTime, eighth * 0.9, "square", 0.07);
        if (step % 2 === 0) {
          const b = BASS[(step / 2) % BASS.length];
          tone(b, nextTime, eighth * 1.8, "triangle", 0.11);
        }
        nextTime += eighth;
        step++;
      }
      timer = setTimeout(scheduler, 30);
    }

    return {
      start() {
        if (!ctx) {
          ctx = new (window.AudioContext || window.webkitAudioContext)();
          master = ctx.createGain();
          master.gain.value = muted ? 0 : 0.5;
          master.connect(ctx.destination);
        }
        if (ctx.state === "suspended") ctx.resume();
        if (timer === null) { nextTime = ctx.currentTime + 0.1; scheduler(); }
      },
      setMuted(m) {
        muted = m;
        if (master) master.gain.value = m ? 0 : 0.5;
      }
    };
  })();

  let musicMuted = localStorage.getItem("unicornMute") === "1";
  const muteBtn = document.getElementById("muteBtn");
  muteBtn.innerHTML = musicMuted ? "&#128263;" : "&#128266;";
  Music.setMuted(musicMuted);
  muteBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    musicMuted = !musicMuted;
    localStorage.setItem("unicornMute", musicMuted ? "1" : "0");
    muteBtn.innerHTML = musicMuted ? "&#128263;" : "&#128266;";
    Music.setMuted(musicMuted);
    Music.start();
  });

  // ---- Drawing ----
  function drawBackground() {
    // sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, "#bdf0ff");
    sky.addColorStop(0.5, "#dff7d8");
    sky.addColorStop(1, "#9cd98f");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // sun
    ctx.fillStyle = "rgba(255, 244, 180, 0.9)";
    ctx.beginPath();
    ctx.arc(W * 0.82, H * 0.2, 45, 0, Math.PI * 2);
    ctx.fill();

    // background trees (parallax)
    for (const t of bgTrees) {
      if (state === "play") t.x -= speed * t.depth;
      if (t.x < -t.size) { t.x = W + t.size; t.depth = 0.3 + Math.random() * 0.5; t.size = 40 + Math.random() * 70; }
      drawTree(t.x, ground, t.size, t.depth);
    }

    // ground
    const g = ctx.createLinearGradient(0, ground, 0, H);
    g.addColorStop(0, "#4a8a3a");
    g.addColorStop(1, "#2c5a23");
    ctx.fillStyle = g;
    ctx.fillRect(0, ground, W, H - ground);
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, ground);
    ctx.lineTo(W, ground);
    ctx.stroke();
  }

  function drawTree(x, baseY, size, depth) {
    const shade = Math.floor(120 * depth);
    ctx.fillStyle = "rgb(" + (60 + shade) + "," + (40 + shade) + ",30)";
    ctx.fillRect(x - size * 0.06, baseY - size, size * 0.12, size);
    ctx.fillStyle = "rgba(" + (30 + shade) + "," + (110 + shade) + "," + (40 + shade) + ",0.95)";
    ctx.beginPath();
    ctx.moveTo(x, baseY - size * 1.9);
    ctx.lineTo(x - size * 0.5, baseY - size * 0.7);
    ctx.lineTo(x + size * 0.5, baseY - size * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, baseY - size * 1.5);
    ctx.lineTo(x - size * 0.55, baseY - size * 0.4);
    ctx.lineTo(x + size * 0.55, baseY - size * 0.4);
    ctx.closePath();
    ctx.fill();
  }

  function drawUnicorn() {
    // flying unicorn (power-up active) — wings flapping, centred on the body
    if (flying && flyReady) {
      const FN = 12;
      const fw = flyImg.naturalWidth / FN;
      const fh = flyImg.naturalHeight;
      const sh = 175;
      const sw = sh * (fw / fh);
      const idx = Math.floor(frame / 7) % FN;
      const blink = flyTimer < 90 && Math.floor(frame / 5) % 2 === 0; // warn near the end
      ctx.save();
      ctx.translate(unicorn.x, unicorn.y - sh * 0.30);   // body floats above the ref line
      // soft rainbow aura
      ctx.globalAlpha = 0.30 + 0.10 * Math.sin(frame * 0.2);
      ctx.fillStyle = "hsl(" + ((frame * 5) % 360) + ",100%,65%)";
      ctx.beginPath();
      ctx.ellipse(0, 0, sw * 0.5, sh * 0.42, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = blink ? 0.45 : 1;
      ctx.scale(-1, 1); // face right
      ctx.drawImage(flyImg, idx * fw, 0, fw, fh, -sw / 2, -sh / 2, sw, sh);
      ctx.restore();
      return;
    }
    // galloping unicorn — cycle through the sprite sheet (each frame is centred
    // on the unicorn's body, so the torso stays steady while the legs move).
    if (unicornReady) {
      const FRAMES = 8;
      const fw = unicornImg.naturalWidth / FRAMES;
      const fh = unicornImg.naturalHeight;
      const sh = 130;
      const sw = sh * (fw / fh);
      const FOOT_FRAC = 0.88; // feet sit 88% down the frame -> plant them on the ground
      // tie the gallop to distance travelled so the legs match the ground speed
      // (no foot-sliding); hold a leaping pose (frame 5, air extend) while airborne.
      // Cycle only the dynamic gallop poses (frames 2–7); frames 1 & 8 are
      // near-standing poses that look like a pause at the loop point.
      const SEQ = [1, 2, 3, 4, 5, 6]; // 0-based indices = sprite frames 2–7
      const STRIDE = 2.5;             // larger = legs cycle slower per distance
      const idx = unicorn.onGround ? SEQ[Math.floor(score / STRIDE) % SEQ.length] : 4;
      ctx.save();
      ctx.translate(unicorn.x, unicorn.y);            // unicorn.y is the ground line
      // pink heart-power glow while smashing
      if (smashing) {
        const blink = smashTimer < 90 && Math.floor(frame / 5) % 2 === 0;
        ctx.globalAlpha = (blink ? 0.18 : 0.4) + 0.1 * Math.sin(frame * 0.3);
        ctx.fillStyle = "hsl(" + (330 + 20 * Math.sin(frame * 0.2)) + ",100%,68%)";
        ctx.beginPath();
        ctx.ellipse(0, -sh * 0.42, sw * 0.42, sh * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.scale(-1, 1); // flip to face right (the run direction)
      ctx.drawImage(unicornImg, idx * fw, 0, fw, fh, -sw / 2, -FOOT_FRAC * sh, sw, sh);
      ctx.restore();
    }
  }

  const RAINBOW = ["#ff5b5b", "#ffae3b", "#ffe93b", "#5bff7a", "#5bd2ff", "#b06bff"];

  // (legacy drawn unicorn — kept for reference, no longer used)
  function drawUnicornBody(cx, feetY, u) {
    const s = u / 60;
    const gallop = unicorn.onGround ? frame * 0.45 : 1.2;
    ctx.save();
    ctx.translate(cx, feetY);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    // --- Tail (rainbow, behind body) ---
    ctx.lineWidth = 5 * s;
    for (let i = 0; i < RAINBOW.length; i++) {
      const wob = Math.sin(frame * 0.18 + i * 0.6) * 4 * s;
      ctx.strokeStyle = RAINBOW[i];
      ctx.beginPath();
      ctx.moveTo(-26 * s, (-46 + i * 3) * s);
      ctx.quadraticCurveTo((-44 - i) * s, (-30 + wob) * s, (-36 + i * 1.5) * s, (-2 + wob) * s);
      ctx.stroke();
    }

    // --- Legs (galloping) ---
    ctx.strokeStyle = "#f0e4ee";
    ctx.lineWidth = 6 * s;
    const hipY = -16 * s;
    function leg(hipX, phase) {
      const off = Math.sin(gallop + phase) * 9 * s;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(hipX + off, -1 * s);
      ctx.stroke();
    }
    leg(-18 * s, 0);          // back legs
    leg(-13 * s, Math.PI);
    leg(15 * s, Math.PI);     // front legs
    leg(20 * s, 0);

    // --- Body ---
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.ellipse(0, -30 * s, 28 * s, 17 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- Neck + head ---
    ctx.beginPath();
    ctx.moveTo(16 * s, -38 * s);
    ctx.lineTo(26 * s, -40 * s);
    ctx.lineTo(40 * s, -62 * s);
    ctx.lineTo(48 * s, -58 * s);
    ctx.lineTo(34 * s, -34 * s);
    ctx.closePath();
    ctx.fill();
    // head
    ctx.beginPath();
    ctx.ellipse(46 * s, -60 * s, 11 * s, 9 * s, -0.5, 0, Math.PI * 2);
    ctx.fill();
    // muzzle
    ctx.beginPath();
    ctx.ellipse(54 * s, -54 * s, 6 * s, 5 * s, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // --- Mane (rainbow along the neck) ---
    ctx.lineWidth = 4 * s;
    for (let i = 0; i < RAINBOW.length; i++) {
      ctx.strokeStyle = RAINBOW[i];
      const t = i / (RAINBOW.length - 1);
      ctx.beginPath();
      ctx.moveTo((40 - t * 26) * s, (-66 + t * 30) * s);
      ctx.lineTo((34 - t * 26) * s, (-60 + t * 30) * s);
      ctx.stroke();
    }

    // --- Horn ---
    ctx.fillStyle = "#ffd24d";
    ctx.beginPath();
    ctx.moveTo(48 * s, -70 * s);
    ctx.lineTo(44 * s, -82 * s);
    ctx.lineTo(52 * s, -69 * s);
    ctx.closePath();
    ctx.fill();

    // --- Ear ---
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(40 * s, -68 * s);
    ctx.lineTo(38 * s, -78 * s);
    ctx.lineTo(46 * s, -70 * s);
    ctx.closePath();
    ctx.fill();

    // --- Eye ---
    ctx.fillStyle = "#3a2a3a";
    ctx.beginPath();
    ctx.arc(49 * s, -60 * s, 2 * s, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawObstacles() {
    for (const o of obstacles) {
      ctx.font = o.size + "px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.fillText(o.emoji, o.x, ground);
    }
  }

  function starPath(cx, cy, outer, inner, rot) {
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const r = (i % 2 === 0) ? outer : inner;
      const a = rot + i * Math.PI / 5;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function drawStars() {
    for (const s of stars) {
      const sy = s.y + Math.sin(frame * 0.1 + s.bob) * 6;
      const hue = (frame * 8 + s.bob * 40) % 360;       // rainbow flash
      const pulse = 1 + 0.12 * Math.sin(frame * 0.25 + s.bob);
      ctx.save();
      ctx.translate(s.x, sy);
      ctx.rotate(Math.sin(frame * 0.04 + s.bob) * 0.25);
      ctx.shadowColor = "hsl(" + hue + ",100%,60%)";
      ctx.shadowBlur = 22;
      ctx.fillStyle = "hsl(" + hue + ",100%,62%)";
      starPath(0, 0, s.r * pulse, s.r * 0.45 * pulse, -Math.PI / 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      starPath(0, 0, s.r * 0.5 * pulse, s.r * 0.22 * pulse, -Math.PI / 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function heartPath(cx, cy, s) {
    // s = overall radius-ish scale
    ctx.beginPath();
    ctx.moveTo(cx, cy + s * 0.85);
    ctx.bezierCurveTo(cx - s * 1.2, cy - s * 0.2, cx - s * 0.55, cy - s * 1.0, cx, cy - s * 0.35);
    ctx.bezierCurveTo(cx + s * 0.55, cy - s * 1.0, cx + s * 1.2, cy - s * 0.2, cx, cy + s * 0.85);
    ctx.closePath();
  }

  function drawHearts() {
    for (const h of hearts) {
      const hy = h.y + Math.sin(frame * 0.1 + h.bob) * 6;
      const hue = (frame * 8 + h.bob * 40) % 360;       // rainbow flash
      const pulse = 1 + 0.12 * Math.sin(frame * 0.25 + h.bob);
      ctx.save();
      ctx.translate(h.x, hy);
      ctx.rotate(Math.sin(frame * 0.04 + h.bob) * 0.18);
      ctx.shadowColor = "hsl(" + hue + ",100%,60%)";
      ctx.shadowBlur = 22;
      ctx.fillStyle = "hsl(" + hue + ",100%,62%)";
      heartPath(0, 0, h.r * pulse);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      heartPath(0, -h.r * 0.05, h.r * 0.5 * pulse);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawSparkles() {
    for (const p of sparkles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = "hsl(" + p.hue + ",100%,65%)";
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3.5 * p.life + 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawScore() {
    ctx.fillStyle = "#1c3a16";
    ctx.font = "bold 26px 'Segoe UI', sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    ctx.fillText("Distance: " + Math.floor(score) + "m", 18, 70);
    ctx.fillText("Best: " + best + "m", 18, 102);

    // power-up timer bars (flight stacks above smash when both are active)
    let by = 162;
    if (flying)   by = powerBar("✨ Flying!",  flyTimer / FLY_DURATION,    by);
    if (smashing) by = powerBar("💖 Smash!",   smashTimer / SMASH_DURATION, by);
  }

  function powerBar(label, frac, by) {
    const bw = 180, bx = 18;
    frac = Math.max(0, frac);
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(bx, by, bw, 14);
    const grad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    grad.addColorStop(0, "#ff5b5b"); grad.addColorStop(0.5, "#ffe93b"); grad.addColorStop(1, "#5bd2ff");
    ctx.fillStyle = grad;
    ctx.fillRect(bx, by, bw * frac, 14);
    ctx.fillStyle = "#1c3a16";
    ctx.font = "bold 18px 'Segoe UI', sans-serif";
    ctx.fillText(label, bx, by - 22);
    return by + 44;   // next bar position
  }

  // ---- Update ----
  const OBSTACLE_TYPES = [
    { emoji: "🪵", size: 60 }, // log
    { emoji: "🪨", size: 52 }, // rock
    { emoji: "🍄", size: 52 }, // mushroom
    { emoji: "🌲", size: 46 }, // small evergreen
    { emoji: "🦄", size: 64 }, // another unicorn!
    { emoji: "🦊", size: 54 }, // fox
    { emoji: "🦔", size: 48 }, // hedgehog
    { emoji: "🐗", size: 60 }, // boar
    { emoji: "🦌", size: 64 }, // deer
    { emoji: "🐢", size: 50 }, // turtle
    { emoji: "🌳", size: 52 }, // bush/tree
    { emoji: "🪺", size: 48 }  // nest
  ];

  function spawnObstacle(xOffset) {
    const t = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
    obstacles.push({ x: W + 60 + (xOffset || 0), emoji: t.emoji, size: t.size, w: t.size * 0.7, h: t.size });
  }

  function spawnStar() {
    // float at a jump-reachable height above the ground
    stars.push({ x: W + 70, y: ground - (90 + Math.random() * 90), r: 22, bob: Math.random() * 6.28 });
  }

  function spawnHeart() {
    // float low so it can be grabbed while running (or with a little hop)
    hearts.push({ x: W + 70, y: ground - (45 + Math.random() * 75), r: 22, bob: Math.random() * 6.28 });
  }

  function update() {
    frame++;
    if (state === "play") {
      score += speed * 0.04;
      speed += 0.0025;

      // physics
      if (flying) {
        unicorn.vy += FLY_GRAV;
        unicorn.y += unicorn.vy;
        const ceiling = H * 0.30;
        if (unicorn.y < ceiling) { unicorn.y = ceiling; unicorn.vy = 0; }
        if (unicorn.y > ground)  { unicorn.y = ground;  unicorn.vy = 0; }
        unicorn.onGround = false;
        if (frame % 4 === 0) burst(unicorn.x - 40, unicorn.y - 30, 1);  // sparkle trail
        flyTimer--;
        if (flyTimer <= 0) flying = false;     // drift back down, gravity takes over
      } else {
        unicorn.vy += GRAV;
        unicorn.y += unicorn.vy;
        if (unicorn.y >= ground) {
          unicorn.y = ground;
          unicorn.vy = 0;
          unicorn.onGround = true;
        }
      }

      // spawn obstacles
      spawnTimer--;
      if (spawnTimer <= 0) {
        spawnObstacle();
        // once it speeds up, sometimes send a little group (still jumpable)
        if (speed > 8 && Math.random() < 0.3) spawnObstacle(48 + Math.random() * 24);
        spawnTimer = Math.max(38, 100 - speed * 4) + Math.random() * 35;
      }

      // spawn power-up stars (flight)
      starTimer--;
      if (starTimer <= 0) {
        spawnStar();
        starTimer = 60 * (11 + Math.random() * 7);   // every ~11-18s
      }

      // spawn power-up hearts (smash)
      heartTimer--;
      if (heartTimer <= 0) {
        spawnHeart();
        heartTimer = 60 * (13 + Math.random() * 8);  // every ~13-21s
      }

      // smash power-up countdown
      if (smashing) {
        smashTimer--;
        if (smashTimer <= 0) smashing = false;
      }

      // move obstacles + power-ups
      for (const o of obstacles) o.x -= speed;
      obstacles = obstacles.filter(o => o.x > -80);
      for (const s of stars) s.x -= speed;
      for (const h of hearts) h.x -= speed;

      const ub = {
        left: unicorn.x - unicorn.size * 0.45,
        right: unicorn.x + unicorn.size * 0.45,
        top: unicorn.y - unicorn.size * 0.82,
        bottom: unicorn.y - unicorn.size * 0.04
      };

      // collect stars -> start / refresh flight
      for (const s of stars) {
        const sy = s.y + Math.sin(frame * 0.1 + s.bob) * 6;
        const cx = (ub.left + ub.right) / 2, cy = (ub.top + ub.bottom) / 2;
        if (Math.hypot(s.x - cx, sy - cy) < s.r + unicorn.size * 0.5) {
          s.dead = true;
          burst(s.x, sy, 26);
          startFlight();
        }
      }
      stars = stars.filter(s => !s.dead && s.x > -60);

      // collect hearts -> start / refresh smash power-up
      for (const h of hearts) {
        const hy = h.y + Math.sin(frame * 0.1 + h.bob) * 6;
        const cx = (ub.left + ub.right) / 2, cy = (ub.top + ub.bottom) / 2;
        if (Math.hypot(h.x - cx, hy - cy) < h.r + unicorn.size * 0.5) {
          h.dead = true;
          burst(h.x, hy, 26);
          startSmash();
        }
      }
      hearts = hearts.filter(h => !h.dead && h.x > -60);

      // obstacle collisions — destroyed into sparkles while flying or smashing
      const invincible = flying || smashing;
      for (const o of obstacles) {
        const ob = {
          left: o.x - o.w * 0.5,
          right: o.x + o.w * 0.5,
          top: ground - o.h,
          bottom: ground
        };
        if (ub.right > ob.left && ub.left < ob.right &&
            ub.bottom > ob.top && ub.top < ob.bottom) {
          if (invincible) {
            o.dead = true;
            burst(o.x, ground - o.h * 0.5, 14);
          } else {
            gameOver();
            break;
          }
        }
      }
      if (invincible) obstacles = obstacles.filter(o => !o.dead);

      // update sparkle particles
      for (const p of sparkles) {
        p.x += p.vx - speed * 0.3;
        p.y += p.vy;
        p.vy += 0.12;
        p.life -= 0.025;
      }
      sparkles = sparkles.filter(p => p.life > 0);
    }
  }

  function loop() {
    update();
    drawBackground();
    drawObstacles();
    drawStars();
    drawHearts();
    drawUnicorn();
    drawSparkles();
    if (state !== "start") drawScore();
    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", resize);
  resize();
  seedTrees();
  loop();
})();
</script>
</body>
</html>

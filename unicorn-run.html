<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> ELLE'S Unicorn Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    min-height: 100%;
    background: #0d1b12;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 18px 0;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(4px);
    z-index: 10;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    font-size: 1.4rem;
    transition: color 0.2s, text-shadow 0.2s;
  }

  nav a:hover {
    color: #ff66cc;
    text-shadow: 0 0 12px #ff66cc;
  }

  .game-wrap {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: manipulation;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(13, 27, 18, 0.55);
    backdrop-filter: blur(2px);
    cursor: pointer;
  }

  .overlay.hidden { display: none; }

  .overlay h1 {
    font-family: "Pacifico", cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    margin: 0 0 10px;
    color: #ff9ae0;
    text-shadow: 0 0 20px #c44dad;
  }

  .overlay p {
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    margin: 6px 0;
  }

  .play-btn {
    margin-top: 22px;
    padding: 14px 38px;
    font-size: 1.5rem;
    font-family: "Pacifico", cursive;
    color: #fff;
    background: linear-gradient(90deg, #ff66cc, #b06bff);
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 0 22px rgba(255, 102, 204, 0.7);
    transition: transform 0.15s;
  }

  .play-btn:hover { transform: scale(1.06); }

  .mute-btn {
    position: fixed;
    top: 14px;
    right: 18px;
    z-index: 20;
    width: 46px;
    height: 46px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }

  .mute-btn:hover { background: rgba(255, 255, 255, 0.28); }
</style>
</head>
<body>
  <nav>
    <a href="i-love-you-elle.html">Home</a>
    <a href="corgi-facts.html">Corgi Facts</a>
    <a href="nutella-facts.html">Nutella Facts</a>
    <a href="kwame-facts.html">Kwami Facts</a>
    <a href="unicorn-run.html">Unicorn Run</a>
    <a href="solar-system.html">Solar System</a>
  </nav>

  <button class="mute-btn" id="muteBtn" title="Music on / off">&#128266;</button>

  <div class="game-wrap">
    <canvas id="game"></canvas>

    <div class="overlay" id="overlay">
      <h1>&#129412; Elle'S Unicorn Run</h1>
      <p>Help the unicorn dash through the magic forest!</p>
      <p>Tap, click, or press <b>Space</b> / <b>&uarr;</b> to jump.</p>
      <button class="play-btn" id="startBtn">Play &#9733;</button>
    </div>
  </div>

<script>
(function () {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const startBtn = document.getElementById("startBtn");

  let W = 0, H = 0, ground = 0;

  function resize() {
    W = canvas.width = canvas.clientWidth;
    H = canvas.height = canvas.clientHeight;
    ground = H * 0.82;
    unicorn.x = W * 0.18;
    if (state !== "play") unicorn.y = ground;
  }

  // ---- Game state ----
  let state = "start";            // start | play | over
  let score = 0;
  let best = +(localStorage.getItem("unicornBest") || 0);
  let speed = 6;
  let spawnTimer = 0;
  let obstacles = [];
  let trail = [];
  let bgTrees = [];
  let frame = 0;

  const GRAV = 0.8;
  const JUMP = 17;

  const unicorn = { x: 0, y: 0, vy: 0, size: 60, onGround: true };

  function reset() {
    score = 0;
    speed = 6;
    spawnTimer = 40;
    obstacles = [];
    trail = [];
    unicorn.y = ground;
    unicorn.vy = 0;
    unicorn.onGround = true;
  }

  function seedTrees() {
    bgTrees = [];
    for (let i = 0; i < 14; i++) {
      bgTrees.push({
        x: Math.random() * W,
        depth: 0.3 + Math.random() * 0.5,   // parallax factor
        size: 40 + Math.random() * 70
      });
    }
  }

  function jump() {
    if (state === "play" && unicorn.onGround) {
      unicorn.vy = -JUMP;
      unicorn.onGround = false;
    }
  }

  function startGame() {
    reset();
    state = "play";
    overlay.classList.add("hidden");
    Music.start();
  }

  function gameOver() {
    state = "over";
    best = Math.max(best, Math.floor(score));
    localStorage.setItem("unicornBest", best);
    overlay.innerHTML =
      '<h1>Game Over</h1>' +
      '<p>You ran <b>' + Math.floor(score) + 'm</b> &#127807;</p>' +
      '<p>Best: <b>' + best + 'm</b></p>' +
      '<button class="play-btn" id="againBtn">Run Again &#9733;</button>';
    overlay.classList.remove("hidden");
    document.getElementById("againBtn").addEventListener("click", function (e) {
      e.stopPropagation();
      startGame();
    });
  }

  // ---- Input ----
  function handlePress(e) {
    if (state === "play") { jump(); }
  }
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      if (state === "start" || state === "over") startGame();
      else jump();
    }
  });
  canvas.addEventListener("pointerdown", handlePress);
  startBtn.addEventListener("click", function (e) { e.stopPropagation(); startGame(); });

  // ---- Background music (Web Audio, no files needed) ----
  const Music = (function () {
    const NOTE = {
      0: 0, C3: 130.81, E3: 164.81, F3: 174.61, G3: 196.00, A3: 220.00,
      G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25, D5: 587.33, E5: 659.25, G5: 783.99
    };
    // bouncy 4-bar loop in C (I - vi - IV - V), eighth notes
    const MELODY = [
      "C5","E5","G5","E5", "A4","C5","E5","C5",
      "A4","C5","A4","G4", "B4","D5","B4","G4",
      "C5","E5","G5","E5", "A4","C5","E5","C5",
      "G4","B4","D5","G4", "C5",0,0,0
    ].map(n => NOTE[n] || 0);
    const BASS = [
      "C3","C3","A3","A3", "F3","F3","G3","G3",
      "C3","C3","A3","A3", "G3","G3","C3","C3"
    ].map(n => NOTE[n] || 0);

    const tempo = 138, eighth = 60 / tempo / 2;
    let ctx, master, timer = null, nextTime = 0, step = 0, muted = false;

    function tone(freq, t, dur, type, vol) {
      if (!freq) return;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      o.connect(g); g.connect(master);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t);
      o.stop(t + dur + 0.02);
    }

    function scheduler() {
      while (nextTime < ctx.currentTime + 0.15) {
        const m = MELODY[step % MELODY.length];
        tone(m, nextTime, eighth * 0.9, "square", 0.07);
        if (step % 2 === 0) {
          const b = BASS[(step / 2) % BASS.length];
          tone(b, nextTime, eighth * 1.8, "triangle", 0.11);
        }
        nextTime += eighth;
        step++;
      }
      timer = setTimeout(scheduler, 30);
    }

    return {
      start() {
        if (!ctx) {
          ctx = new (window.AudioContext || window.webkitAudioContext)();
          master = ctx.createGain();
          master.gain.value = muted ? 0 : 0.5;
          master.connect(ctx.destination);
        }
        if (ctx.state === "suspended") ctx.resume();
        if (timer === null) { nextTime = ctx.currentTime + 0.1; scheduler(); }
      },
      setMuted(m) {
        muted = m;
        if (master) master.gain.value = m ? 0 : 0.5;
      }
    };
  })();

  let musicMuted = localStorage.getItem("unicornMute") === "1";
  const muteBtn = document.getElementById("muteBtn");
  muteBtn.innerHTML = musicMuted ? "&#128263;" : "&#128266;";
  Music.setMuted(musicMuted);
  muteBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    musicMuted = !musicMuted;
    localStorage.setItem("unicornMute", musicMuted ? "1" : "0");
    muteBtn.innerHTML = musicMuted ? "&#128263;" : "&#128266;";
    Music.setMuted(musicMuted);
    Music.start();
  });

  // ---- Drawing ----
  function drawBackground() {
    // sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, "#bdf0ff");
    sky.addColorStop(0.5, "#dff7d8");
    sky.addColorStop(1, "#9cd98f");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // sun
    ctx.fillStyle = "rgba(255, 244, 180, 0.9)";
    ctx.beginPath();
    ctx.arc(W * 0.82, H * 0.2, 45, 0, Math.PI * 2);
    ctx.fill();

    // background trees (parallax)
    for (const t of bgTrees) {
      if (state === "play") t.x -= speed * t.depth;
      if (t.x < -t.size) { t.x = W + t.size; t.depth = 0.3 + Math.random() * 0.5; t.size = 40 + Math.random() * 70; }
      drawTree(t.x, ground, t.size, t.depth);
    }

    // ground
    const g = ctx.createLinearGradient(0, ground, 0, H);
    g.addColorStop(0, "#4a8a3a");
    g.addColorStop(1, "#2c5a23");
    ctx.fillStyle = g;
    ctx.fillRect(0, ground, W, H - ground);
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, ground);
    ctx.lineTo(W, ground);
    ctx.stroke();
  }

  function drawTree(x, baseY, size, depth) {
    const shade = Math.floor(120 * depth);
    ctx.fillStyle = "rgb(" + (60 + shade) + "," + (40 + shade) + ",30)";
    ctx.fillRect(x - size * 0.06, baseY - size, size * 0.12, size);
    ctx.fillStyle = "rgba(" + (30 + shade) + "," + (110 + shade) + "," + (40 + shade) + ",0.95)";
    ctx.beginPath();
    ctx.moveTo(x, baseY - size * 1.9);
    ctx.lineTo(x - size * 0.5, baseY - size * 0.7);
    ctx.lineTo(x + size * 0.5, baseY - size * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, baseY - size * 1.5);
    ctx.lineTo(x - size * 0.55, baseY - size * 0.4);
    ctx.lineTo(x + size * 0.55, baseY - size * 0.4);
    ctx.closePath();
    ctx.fill();
  }

  function drawUnicorn() {
    // rainbow trail
    trail.push({ x: unicorn.x - unicorn.size * 0.4, y: unicorn.y - unicorn.size * 0.45, life: 1 });
    if (trail.length > 18) trail.shift();
    const colors = ["#ff5b5b", "#ffae3b", "#ffe93b", "#5bff7a", "#5bd2ff", "#b06bff"];
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      t.x -= speed * 0.6;
      ctx.globalAlpha = (i / trail.length) * 0.6;
      ctx.fillStyle = colors[i % colors.length];
      ctx.beginPath();
      ctx.arc(t.x, t.y, unicorn.size * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // full unicorn body with a little run bob
    const bob = unicorn.onGround ? Math.sin(frame * 0.4) * 3 : 0;
    drawUnicornBody(unicorn.x, unicorn.y + bob, unicorn.size);
  }

  const RAINBOW = ["#ff5b5b", "#ffae3b", "#ffe93b", "#5bff7a", "#5bd2ff", "#b06bff"];

  // Draws a whole unicorn facing right, feet resting at feetY.
  function drawUnicornBody(cx, feetY, u) {
    const s = u / 60;
    const gallop = unicorn.onGround ? frame * 0.45 : 1.2;
    ctx.save();
    ctx.translate(cx, feetY);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    // --- Tail (rainbow, behind body) ---
    ctx.lineWidth = 5 * s;
    for (let i = 0; i < RAINBOW.length; i++) {
      const wob = Math.sin(frame * 0.18 + i * 0.6) * 4 * s;
      ctx.strokeStyle = RAINBOW[i];
      ctx.beginPath();
      ctx.moveTo(-26 * s, (-46 + i * 3) * s);
      ctx.quadraticCurveTo((-44 - i) * s, (-30 + wob) * s, (-36 + i * 1.5) * s, (-2 + wob) * s);
      ctx.stroke();
    }

    // --- Legs (galloping) ---
    ctx.strokeStyle = "#f0e4ee";
    ctx.lineWidth = 6 * s;
    const hipY = -16 * s;
    function leg(hipX, phase) {
      const off = Math.sin(gallop + phase) * 9 * s;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(hipX + off, -1 * s);
      ctx.stroke();
    }
    leg(-18 * s, 0);          // back legs
    leg(-13 * s, Math.PI);
    leg(15 * s, Math.PI);     // front legs
    leg(20 * s, 0);

    // --- Body ---
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.ellipse(0, -30 * s, 28 * s, 17 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- Neck + head ---
    ctx.beginPath();
    ctx.moveTo(16 * s, -38 * s);
    ctx.lineTo(26 * s, -40 * s);
    ctx.lineTo(40 * s, -62 * s);
    ctx.lineTo(48 * s, -58 * s);
    ctx.lineTo(34 * s, -34 * s);
    ctx.closePath();
    ctx.fill();
    // head
    ctx.beginPath();
    ctx.ellipse(46 * s, -60 * s, 11 * s, 9 * s, -0.5, 0, Math.PI * 2);
    ctx.fill();
    // muzzle
    ctx.beginPath();
    ctx.ellipse(54 * s, -54 * s, 6 * s, 5 * s, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // --- Mane (rainbow along the neck) ---
    ctx.lineWidth = 4 * s;
    for (let i = 0; i < RAINBOW.length; i++) {
      ctx.strokeStyle = RAINBOW[i];
      const t = i / (RAINBOW.length - 1);
      ctx.beginPath();
      ctx.moveTo((40 - t * 26) * s, (-66 + t * 30) * s);
      ctx.lineTo((34 - t * 26) * s, (-60 + t * 30) * s);
      ctx.stroke();
    }

    // --- Horn ---
    ctx.fillStyle = "#ffd24d";
    ctx.beginPath();
    ctx.moveTo(48 * s, -70 * s);
    ctx.lineTo(44 * s, -82 * s);
    ctx.lineTo(52 * s, -69 * s);
    ctx.closePath();
    ctx.fill();

    // --- Ear ---
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(40 * s, -68 * s);
    ctx.lineTo(38 * s, -78 * s);
    ctx.lineTo(46 * s, -70 * s);
    ctx.closePath();
    ctx.fill();

    // --- Eye ---
    ctx.fillStyle = "#3a2a3a";
    ctx.beginPath();
    ctx.arc(49 * s, -60 * s, 2 * s, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawObstacles() {
    for (const o of obstacles) {
      ctx.font = o.size + "px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.fillText(o.emoji, o.x, ground);
    }
  }

  function drawScore() {
    ctx.fillStyle = "#1c3a16";
    ctx.font = "bold 26px 'Segoe UI', sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    ctx.fillText("Distance: " + Math.floor(score) + "m", 18, 70);
    ctx.fillText("Best: " + best + "m", 18, 102);
  }

  // ---- Update ----
  const OBSTACLE_TYPES = [
    { emoji: "🪵", size: 46 }, // log
    { emoji: "🪨", size: 40 }, // rock
    { emoji: "🍄", size: 40 }, // mushroom
    { emoji: "🌲", size: 34 }, // small evergreen
    { emoji: "🦄", size: 50 }, // another unicorn!
    { emoji: "🦊", size: 42 }, // fox
    { emoji: "🦔", size: 36 }, // hedgehog
    { emoji: "🐗", size: 46 }, // boar
    { emoji: "🦌", size: 50 }, // deer
    { emoji: "🐢", size: 38 }, // turtle
    { emoji: "🌳", size: 40 }, // bush/tree
    { emoji: "🪺", size: 36 }  // nest
  ];

  function spawnObstacle(xOffset) {
    const t = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
    obstacles.push({ x: W + 60 + (xOffset || 0), emoji: t.emoji, size: t.size, w: t.size * 0.7, h: t.size });
  }

  function update() {
    frame++;
    if (state === "play") {
      score += speed * 0.04;
      speed += 0.0025;

      // physics
      unicorn.vy += GRAV;
      unicorn.y += unicorn.vy;
      if (unicorn.y >= ground) {
        unicorn.y = ground;
        unicorn.vy = 0;
        unicorn.onGround = true;
      }

      // spawn
      spawnTimer--;
      if (spawnTimer <= 0) {
        spawnObstacle();
        // once it speeds up, sometimes send a little group (still jumpable)
        if (speed > 8 && Math.random() < 0.3) spawnObstacle(48 + Math.random() * 24);
        spawnTimer = Math.max(38, 100 - speed * 4) + Math.random() * 35;
      }

      // move + collide
      for (const o of obstacles) o.x -= speed;
      obstacles = obstacles.filter(o => o.x > -80);

      const ub = {
        left: unicorn.x - unicorn.size * 0.32,
        right: unicorn.x + unicorn.size * 0.32,
        top: unicorn.y - unicorn.size * 0.72,
        bottom: unicorn.y - unicorn.size * 0.05
      };
      for (const o of obstacles) {
        const ob = {
          left: o.x - o.w * 0.5,
          right: o.x + o.w * 0.5,
          top: ground - o.h,
          bottom: ground
        };
        if (ub.right > ob.left && ub.left < ob.right &&
            ub.bottom > ob.top && ub.top < ob.bottom) {
          gameOver();
          break;
        }
      }
    }
  }

  function loop() {
    update();
    drawBackground();
    drawObstacles();
    drawUnicorn();
    if (state !== "start") drawScore();
    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", resize);
  resize();
  seedTrees();
  loop();
})();
</script>
</body>
</html>

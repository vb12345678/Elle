<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Elle so much!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Pacifico", cursive;
    overflow: hidden;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 18px 0;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(4px);
    z-index: 10;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    font-size: 1.4rem;
    transition: color 0.2s, text-shadow 0.2s;
  }

  nav a:hover {
    color: #ff66cc;
    text-shadow: 0 0 12px #ff66cc;
  }

  .message {
    padding: 50px 70px;
    border-radius: 20px;
    font-size: clamp(2rem, 8vw, 6rem);
    font-weight: italic;
    text-align: center;
    color: #fff;
    /* Flashing, color-changing glowing border */
    border: 8px solid red;
    animation:
      colorShift 4s linear infinite,
      flash 1s ease-in-out infinite alternate;
  }

  /* Cycle the border + glow color around the rainbow */
  @keyframes colorShift {
    0%   { border-color: #ff0000; box-shadow: 0 0 25px #ff0000, 0 0 50px #ff0000; color: #ff8080; }
    16%  { border-color: #ff9900; box-shadow: 0 0 25px #ff9900, 0 0 50px #ff9900; color: #ffd080; }
    33%  { border-color: #ffff00; box-shadow: 0 0 25px #ffff00, 0 0 50px #ffff00; color: #ffff99; }
    50%  { border-color: #33ff33; box-shadow: 0 0 25px #33ff33, 0 0 50px #33ff33; color: #b3ffb3; }
    66%  { border-color: #00ccff; box-shadow: 0 0 25px #00ccff, 0 0 50px #00ccff; color: #b3ecff; }
    83%  { border-color: #cc66ff; box-shadow: 0 0 25px #cc66ff, 0 0 50px #cc66ff; color: #e6ccff; }
    100% { border-color: #ff0000; box-shadow: 0 0 25px #ff0000, 0 0 50px #ff0000; color: #ff8080; }
  }

  /* Flashing on/off effect */
  @keyframes flash {
    0%   { opacity: 1; }
    100% { opacity: 0.35; }
  }
</style>
</head>
<body>
  <nav>
    <a href="i-love-you-elle.html">Home</a>

  </nav>
  <div class="message"> Elle'S Fun Facts! &#10084;</div> 
</body>
</html>
